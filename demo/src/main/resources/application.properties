spring.application.name=demo

# PORTA (necessário para o Railway — usa a porta dinâmica e cai para 8080 localmente)
server.port=${PORT:8080}

# CONFIGURAÇÃO DA BASE DE DADOS (PREPARADA PARA LOCAL E DEPLOY)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edenred_sustentavel}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURAÇÕES DO HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORREÇÃO DO DIALECT DEPRECATED (MySQLDialect resolve para a versão correta)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect